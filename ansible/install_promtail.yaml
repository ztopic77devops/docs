---
- name: deploy promtail
  become: true
  remote_user: root

  hosts: all

  tasks:

   - name:  copy promtail map
     ansible.builtin.copy:
      src: /home/<user>/Apps/ansible/files/promtail/
      dest: /opt/promtail
      owner: root
      group: root

   - name:  copy promtail-2.2.1 map
     ansible.builtin.copy:
      src: /home/<user>/Apps/ansible/files/promtail-2.2.1/
      dest: /opt/versions/promtail-2.2.1
      owner: root
      group: root

   - name: promtail rights
     command: chmod -R 755 /opt/promtail

   - name: promtail-2.2.1 rights
     command: chmod -R 755 /opt/versions/promtail-2.2.1

   - name: create promtail conf in supervisor
     copy:
      dest: /etc/supervisor/conf.d/promtail.conf
      content: |
       [program:promtail]
       command=/opt/promtail/promtail --config.file=promtail.yaml --client.external-labels=host=%(host_node_name)s
       autostart=true
       autorestart=true
       stopasgroup=true
       directory=/opt/promtail
       stderr_logfile=/var/log/promtail.err.log
       stdout_logfile=/var/log/promtail.out.log
       stopsignal=INT
       stopwaitsecs=300

   - name: change promtail.yaml
     copy:
      dest: /opt/promtail/promtail.yaml
      content: |
       server:
         http_listen_port: 9080
         grpc_listen_port: 0

       positions:
         filename: /opt/promtail/positions.yaml

       clients:
         - url: http://<grafana_ip>:3100/loki/api/v1/push

       scrape_configs:

       - job_name: containers
         static_configs:
         - targets:
             - localhost
           labels:
             job: containerlogs
             __path__: /var/lib/docker/containers/*/*log

         pipeline_stages:
         - json:
             expressions:
               container_stream: stream
               attrs: attrs
               container_name: attrs.tag
               container_env: attrs.container_env
               container_app: attrs.container_app

         - labels:
             container_stream:
             container_name:
             container_env:
             container_app:

       - job_name: apperror
         static_configs:
         - targets:
             - localhost
           labels:
             env: rc
             job: apperror
             __path__: /var/log/supervisor/*.err.log

       - job_name: appout
         static_configs:
         - targets:
             - localhost
           labels:
             env: rc
             job: appout
             __path__: /var/log/supervisor/*.out.log

       - job_name: syslog
         static_configs:
         - targets:
             - localhost
           labels:
             env: rc
             job: syslog
             __path__: /var/log/syslog

       - job_name: postgres
         static_configs:
         - targets:
             - localhost
           labels:
             env: rc
             job: postgres
             __path__: /var/log/postgresql/postgresql-10-main.log

       - job_name: mysql
         static_configs:
         - targets:
             - localhost
           labels:
             env: rc
             job: mysql
             __path__: /var/log/mysql/error.log

       - job_name: haproxy
         static_configs:
         - targets:
             - localhost

           labels:
             env: rc
             job: haproxy
             __path__: /var/log/haproxy.log
         pipeline_stages:
         - match:
             selector: '{job="haproxy"}'
             stages:
             - timestamp:
                 format: RFC3339Nano
                 source: request_date

   - name: supervisor reread
     command: sudo supervisorctl reread

   - name: update supervisor
     command: sudo supervisorctl update
     