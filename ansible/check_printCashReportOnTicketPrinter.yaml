---
- name: Check printCashReportOnTicketPrinter setting
  hosts: all
  gather_facts: no

  tasks:
    - name: Get printCashReportOnTicketPrinter value from JSON
      command: jq -r '.printCashReportOnTicketPrinter' /home/<user>/.config/TerminalApp/config.json
      register: print_setting
      changed_when: false

    - name: Show status and handle result
      shell: |
        if [ "{{ print_setting.stdout }}" = "0" ]; then
          echo -e "printCashReportOnTicketPrinter is 0 "
        else
          echo -e "printCashReportOnTicketPrinter is 1 "
          exit 1
        fi
      args:
        executable: /bin/bash
      register: printer_status
      changed_when: false
      ignore_errors: true

    - name: Display status message
      debug:
        msg: "{{ printer_status.stdout_lines }}"
      when: printer_status.stdout is defined

    - name: Fail if printer setting is 1
      fail:
        msg: "printCashReportOnTicketPrinter is 1 (enabled) and should be 0!"
      when: printer_status.rc != 0
