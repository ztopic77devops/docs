---
- name: get disk serial number
  become: true
  remote_user: root
  
  hosts: all

  tasks:
   - name: get hostname and serial
     shell: cat /etc/hostname && nvme id-ctrl /dev/nvme0n1 | grep sn -m 1 | cut -d ':' -f2 | sed 's/ //g'
     register: output

   - name: print hostname and serial
     debug: var=output.stdout_lines