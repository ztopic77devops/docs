---
- name: change promtail config
  become: true
  remote_user: root

  hosts: all

  tasks:

   - name: change promtail.yaml-a
     copy:
      dest: /opt/promtail/promtail.yaml
      content: |
       server:
         http_listen_port: 9080
         grpc_listen_port: 0

       positions:
         filename: /opt/promtail/positions.yaml

       clients:
         - url: http://<grafana_ip>:3100/loki/api/v1/push

       scrape_configs:

       - job_name: containers
         static_configs:
         - targets:
             - localhost
           labels:
             job: containerlogs
             __path__: /var/lib/docker/containers/*/*log

         pipeline_stages:
         - json:
             expressions:
               container_stream: stream
               attrs: attrs
               container_name: attrs.tag
               container_env: attrs.container_env
               container_app: attrs.container_app

         - labels:
             container_stream:
             container_name:
             container_env:
             container_app:

       - job_name: apperror
         static_configs:
         - targets:
             - localhost
           labels:
             env: dev
             job: apperror
             __path__: /var/log/supervisor/*.err.log

       - job_name: appout
         static_configs:
         - targets:
             - localhost
           labels:
             env: dev
             job: appout
             __path__: /var/log/supervisor/*.out.log

       - job_name: syslog
         static_configs:
         - targets:
             - localhost
           labels:
             env: dev
             job: syslog
             __path__: /var/log/syslog

       - job_name: postgres
         static_configs:
         - targets:
             - localhost
           labels:
             env: dev
             job: postgres
             __path__: /var/log/postgresql/postgresql-10-main.log

       - job_name: mysql
         static_configs:
         - targets:
             - localhost
           labels:
             env: dev
             job: mysql
             __path__: /var/log/mysql/error.log

       - job_name: haproxy
         static_configs:
         - targets:
             - localhost

           labels:
             env: dev
             job: haproxy
             __path__: /var/log/haproxy.log
         pipeline_stages:
         - match:
             selector: '{job="haproxy"}'
             stages:
             - timestamp:
                 format: RFC3339Nano
                 source: request_date

   - name: supervisor restart promtail
     command: sudo supervisorctl restart promtail
